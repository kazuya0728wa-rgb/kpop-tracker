name: 音楽最新情報ダイジェスト

on:
  schedule:
    - cron: "4 0 */2 * *"     # 2日に1回 09:04 JST (00:04 UTC)
  workflow_dispatch:           # 手動実行

concurrency:
  group: music-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest-kpop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run K-pop Tracker
        env:
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
        run: python kpop_tracker.py --channel kpop

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update kpop data [skip ci]"
          git push

  digest-jpop:
    needs: digest-kpop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest
        run: git pull --rebase origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run J-pop Tracker
        env:
          DISCORD_WEBHOOK_JPOP:    ${{ secrets.DISCORD_WEBHOOK_JPOP }}
          DISCORD_BOT_TOKEN:       ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID_JPOP: ${{ secrets.DISCORD_CHANNEL_ID_JPOP }}
          DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
        run: python kpop_tracker.py --channel jpop

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update jpop data [skip ci]"
          git push
