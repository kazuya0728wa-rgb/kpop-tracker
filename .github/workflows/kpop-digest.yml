name: K-pop最新情報ダイジェスト

on:
  schedule:
    - cron: "4 0 */2 * *"     # 2日に1回 09:04 JST (00:04 UTC)
  workflow_dispatch:           # 手動実行

concurrency:
  group: kpop-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run K-pop Tracker
        env:
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
        run: python kpop_tracker.py

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --cached --quiet || git commit -m "Update data files [skip ci]"
          git push
